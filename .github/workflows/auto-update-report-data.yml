name: Auto Update Report Data

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  schedule:
    # Every hour (minute 5)
    - cron: "5 * * * *"

permissions:
  contents: write

concurrency:
  group: auto-update-report-data
  cancel-in-progress: false

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Muscat
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build latest report data
        run: python run_all.py

      - name: Commit and push changes (if any)
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add data/report data/roster data/flight_dispatch data/offload || true

          if git diff --cached --quiet; then
            echo "No tracked changes after staging."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -m "chore(data): auto update report snapshots"
          git push
